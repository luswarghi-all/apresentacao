    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];

            const reader = ds.readable.getReader();

    // would push the parser into quirks mode. DOMParser always emits a <head>

kground-image:linear-gradient(transparent 70%,var(--yellow) 70%);\n  background-position:0 88%;\n  background-repeat:no-repeat;\n  padding:0 4px;\n}\n\n.hero p.kicker{\n  font-size:16px;\n  color:var(--ink-soft);\n  font-weight:700;\n  max-width:460px;\n  margin:0 auto 22px;\n  position:relative;z-index:1;\n}\n\n/* \u2500\u2500\u2500\u2500\u2500 VIDEO \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n.video-wrap{padding:8px var(--pad-x) 18px;max-width:780px;margin:0 auto}\n.video-frame{\n  position:relative;border-radius:calc(var(--radius-card) + 4px);\n  padding:6px;background:linear-gradient(135deg,var(--yellow) 0%,var(--purple) 100%);\n  box-shadow:var(--shadow);\n  max-width:340px;margin:0 auto;\n}\n.video-box{\n  background:#1A1530;\n  border-radius:var(--radius-card);\n  overflow:hidden;\n  position:relative;\n}\n.video-ph{\n  width:100%;aspect-ratio:9/16;\n  display:flex;flex-direction:column;\n  align-items:center;justify-content:center;gap:14px;\n  background:\n    radial-gradient(120% 80% at 30% 20%,rgba(255,204,0,.12) 0%,transparent 60%),\n    linear-gradient(135deg,#2A1A5E 0%,#4A2FB0 100%);\n  position:relative;overflow:hidden;\n}\n.video-ph::before{\n  content:'';position:absolute;width:260px;height:260px;border-radius:50%;\n  background:rgba(255,204,0,.07);top:-80px;right:-80px;\n}\n.play-ring{\n  width:78px;height:78px;border-radius:50%;\n  background:var(--yellow);\n  display:flex;align-items:center;justify-content:center;\n  box-shadow:0 0 0 0 rgba(255,204,0,.55);\n  position:relative;z-index:1;cursor:pointer;\n  animation:pulseRing 2.2s ease-out infinite;\n}\n@keyframes pulseRing{\n  0%{box-shadow:0 0 0 0 rgba(255,204,0,.5)}\n  70%{box-shadow:0 0 0 22px rgba(255,204,0,0)}\n  100%{box-shadow:0 0 0 0 rgba(255,204,0,0)}\n}\n.play-ring svg{margin-left:4px}\n.video-ph small{\n  color:rgba(255,255,255,.55);font-size:11px;font-weight:800;\n  letter-spacing:.12em;text-transform:uppercase;position:relative;z-index:1;\n}\n.video-caption{\n  text-align:center;font-size:13px;color:var(--ink-mute);\n  font-weight:700;margin-top:14px;\n}\n.video-caption svg{vertical-align:-3px;margin-right:4px}\n\n/* \u2500\u2500\u2500\u2500\u2500 PRIMARY CTA \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n.cta-area{padding:8px var(--pad-x) 12px;max-width:780px;margin:0 auto;text-align:center}\n.btn-main{\n  display:inline-flex;align-items:center;justify-content:center;gap:10px;\n  background:var(--purple);color:#fff;\n  font:inherit;font-size:16px;font-weight:900;\n  padding:18px 28px;border-radius:var(--radius-btn);\n  text-decoration:none;border:none;cursor:pointer;\n  transition:transform .15s,box-shadow .2s,background .2s;\n  box-shadow:0 10px 26px -8px rgba(123,79,232,.55);\n  width:100%;max-width:480px;\n  letter-spacing:.01em;\n  position:relative;\n  overflow:hidden;\n}\n.btn-main::after{\n  content:'';position:absolute;inset:0;\n  background:linear-gradient(120deg,transparent 0%,rgba(255,255,255,.18) 50%,transparent 100%);\n  transform:translateX(-100%);transition:transform .6s;\n}\n.btn-main:hover{background:var(--purple-deep);transform:translateY(-2px);box-shadow:0 14px 34px -8px rgba(123,79,232,.6)}\n.btn-main:hover::after{transform:translateX(100%)}\n.btn-main .arrow{\n  width:26px;height:26px;border-radius:50%;\n  background:var(--yellow);color:var(--ink);\n  display:inline-flex;align-items:center;justify-content:center;\n  font-weight:900;\n}\n.trust-strip{\n  margin-top:14px;\n  display:flex;align-items:center;justify-content:center;\n  gap:10px;flex-wrap:wrap;\n  font-size:12.5px;font-weight:800;color:var(--ink-soft);\n}\n.trust-strip .sep{color:var(--purple-soft)}\n.trust-strip .ico{\n  width:16px;height:16px;border-radius:50%;\n  background:var(--purple-soft);color:var(--purple-deep);\n  display:inline-flex;align-items:center;justify-content:center;\n  margin-right:4px;vertical-align:-3px;\n}\n\n/* \u2500\u2500\u2500\u2500\u2500 GENERIC SECTION \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n.sec{padding:var(--pad-block) var(--pad-x);max-width:780px;margin:0 auto}\n.eyebrow{\n  display:inline-flex;align-items:center;gap:8px;\n  font-size:11.5px;font-weight:900;\n  letter-spacing:.14em;text-transform:uppercase;\n  color:var(--purple-deep);margin-bottom:12px;\n}\n.eyebrow::before{\n  content:'';width:24px;height:2px;background:var(--yellow);border-radius:2px;\n}\n.sec h2{\n  font-size:clamp(26px,5.4vw,38px);\n  font-weight:900;line-height:1.12;\n  letter-spacing:-.015em;\n  margin-bottom:14px;\n  text-wrap:balance;\n}\n.sec .lead{\n  font-size:16px;color:var(--ink-soft);\n  font-weight:600;margin-bottom:30px;\n  max-width:560px;\n}\n\n/* \u2500\u2500\u2500\u2500\u2500 HOW IT WORKS \u2014 STEPS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n.steps{display:grid;grid-template-columns:1fr;gap:var(--gap-card)}\n.step{\n  background:var(--card);\n  border:1.5px solid var(--border);\n  border-radius:var(--radius-card);\n  padding:22px 22px 22px 78px;\n  position:relative;overflow:hidden;\n  transition:transform .25s,box-shadow .25s;\n}\n.step:hover{transform:translateY(-2px);box-shadow:var(--shadow)}\n.step-n{\n  position:absolute;left:18px;top:18px;\n  width:44px;height:44px;border-radius:50%;\n  background:var(--purple-tint);color:var(--purple-deep);\n  font-size:18px;font-weight:900;font-family:'Caveat',cursive;\n  display:flex;align-items:center;justify-content:center;\n  border:2px solid var(--purple);\n}\n.step:nth-child(2) .step-n{background:var(--yellow-soft);color:var(--yellow-deep);border-color:var(--yellow-deep)}\n.step strong{display:block;font-size:16px;font-weight:900;color:var(--ink);margin-bottom:4px}\n.step p{font-size:14px;color:var(--ink-soft);font-weight:600;margin:0}\n.step::after{\n  content:'';position:absolute;width:90px;height:90px;border-radius:50%;\n  top:-30px;right:-30px;opacity:.12;\n}\n.step:nth-child(1)::after{background:var(--purple)}\n.step:nth-child(2)::after{background:var(--yellow)}\n.step:nth-child(3)::after{background:var(--purple-deep)}\n\n/* \u2500\u2500\u2500\u2500\u2500 PURPLE BAND \u2014 MODULES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n.purple-band{\n  background:linear-gradient(180deg,var(--purple-deep) 0%,var(--purple-dark) 100%);\n  padding:var(--pad-block) 0;\n  position:relative;overflow:hidden;\n  margin:24px 0 0;\n}\n.purple-band::before{\n  content:'';position:absolute;width:420px;height:420px;border-radius:50%;\n  background:rgba(255,255,255,.04);top:-120px;right:-120px;\n}\n.purple-band::after{\n  content:'';position:absolute;width:280px;height:280px;border-radius:50%;\n  background:rgba(255,204,0,.07);bottom:-100px;left:-80px;\n}\n.purple-band .inner{\n  max-width:780px;margin:0 auto;padding:0 var(--pad-x);\n  position:relative;z-index:1;\n}\n.purple-band .eyebrow{color:var(--yellow)}\n.purple-band .eyebrow::before{background:var(--yellow)}\n.purple-band h2{color:#fff}\n.purple-band h2 .underline{background-image:linear-gradient(transparent 70%,var(--yellow) 70%)}\n.purple-band .lead{color:rgba(255,255,255,.72)}\n\n/* MODULES ACCORDION */\n.mods{display:flex;flex-direction:column;gap:10px}\n.mod{\n  background:rgba(255,255,255,.07);\n  border:1.5px solid rgba(255,255,255,.12);\n  border-radius:22px;\n  overflow:hidden;cursor:pointer;\n  transition:background .2s,border-color .2s;\n}\n.mod:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.22)}\n.mod-head{display:flex;align-items:center;gap:14px;padding:16px 18px}\n.mod-icon{\n  width:46px;height:46px;border-radius:14px;\n  background:rgba(255,255,255,.16);\n  display:flex;align-items:center;justify-content:center;\n  flex-shrink:0;\n  position:relative;\n}\n.mod-icon::before{\n  /* abstract shape inside icon \u2014 no emoji */\n  content:'';width:18px;height:18px;border-radius:50%;\n  background:var(--yellow);\n}\n.mod:nth-child(2) .mod-icon::before{\n  border-radius:4px;transform:rotate(45deg);background:#fff;\n}\n.mod:nth-child(3) .mod-icon::before{\n  width:0;height:0;background:transparent;border-radius:0;\n  border-left:9px solid transparent;border-right:9px solid transparent;\n  border-bottom:16px solid var(--yellow);\n}\n.mod.star .mod-icon{background:var(--yellow)}\n.mod.star .mod-icon::before{\n  background:transparent;width:22px;height:22px;border-radius:0;\n  clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);\n  background-color:var(--purple-dark);\n}\n.mod-info{flex:1;min-width:0}\n.mod-num{font-size:10.5px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:2px}\n.mod-name{font-size:16px;font-weight:900;color:#fff}\n.mod-badge{\n  background:var(--yellow);color:var(--purple-dark);\n  font-size:10.5px;font-weight:900;\n  padding:4px 10px;border-radius:var(--radius-pill);white-space:nowrap;\n  letter-spacing:.04em;\n  display:inline-flex;align-items:center;gap:4px;\n}\n.mod-arr{\n  color:rgba(255,255,255,.6);transition:transform .3s ease;flex-shrink:0;\n  width:28px;height:28px;border-radius:50%;\n  background:rgba(255,255,255,.1);\n  display:flex;align-items:center;justify-content:center;\n}\n.mod.open .mod-arr{transform:rotate(180deg);background:var(--yellow);color:var(--purple-dark)}\n.mod-body{max-height:0;overflow:hidden;transition:max-height .4s ease}\n.mod.open .mod-body{max-height:240px}\n.mod-body-inner{\n  padding:14px 20px 20px 78px;\n  font-size:14.5px;font-weight:600;\n  color:rgba(255,255,255,.8);line-height:1.55;\n  border-top:1px solid rgba(255,255,255,.1);\n}\n@media(max-width:520px){\n  .mod-body-inner{padding-left:20px}\n}\n\n/* BONUS */\n.bonus{\n  background:linear-gradient(135deg,var(--yellow) 0%,var(--yellow-deep) 100%);\n  border-radius:22px;\n  padding:22px 22px 22px 88px;\n  margin-top:14px;\n  position:relative;\n  box-shadow:0 12px 30px -10px rgba(255,204,0,.45);\n}\n.bonus::before{\n  content:'';position:absolute;left:22px;top:50%;transform:translateY(-50%);\n  width:50px;height:50px;border-radius:50%;\n  background:var(--purple-dark);\n}\n.bonus::after{\n  content:'';position:absolute;left:34px;top:50%;transform:translateY(-50%);\n  width:26px;height:26px;border-radius:50%;\n  border:3px solid var(--yellow);\n  background:var(--yellow);\n}\n.bonus h4{font-size:16px;font-weight:900;color:var(--purple-dark);margin-bottom:4px}\n.bonus p{font-size:13.5px;font-weight:700;color:rgba(46,27,110,.78);margin:0;line-height:1.45}\n\n/* \u2500\u2500\u2500\u2500\u2500 FAQ \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n.faq-list{display:flex;flex-direction:column;gap:10px}\n.faq-item{\n  background:var(--card);\n  border:1.5px solid var(--border);\n  border-radius:20px;\n  overflow:hidden;\n  transition:border-color .2s,box-shadow .2s;\n}\n.faq-item.open{border-color:var(--purple);box-shadow:var(--shadow)}\n.faq-q{\n  width:100%;background:none;border:none;text-align:left;\n  font:inherit;font-size:15.5px;font-weight:800;color:var(--ink);\n  padding:18px 56px 18px 22px;\n  cursor:pointer;position:relative;\n  display:block;line-height:1.4;\n}\n.faq-q::after{\n  content:'';position:absolute;right:18px;top:50%;\n  width:28px;height:28px;border-radius:50%;\n  background:var(--purple-soft);\n  transform:translateY(-50%);\n  transition:background .2s;\n}\n.faq-q::before{\n  content:'';position:absolute;right:24px;top:50%;\n  width:14px;height:14px;\n  background:\n    linear-gradient(var(--purple-deep) 0 0) center/14px 2px no-repeat,\n    linear-gradient(var(--purple-deep) 0 0) center/2px 14px no-repeat;\n  transform:translateY(-50%);\n  transition:transform .3s,background .2s;\n  z-index:1;\n}\n.faq-item.open .faq-q::after{background:var(--yellow)}\n.faq-item.open .faq-q::before{\n  background:linear-gradient(var(--purple-dark) 0 0) center/14px 2px no-repeat;\n  transform:translateY(-50%) rotate(180deg);\n}\n.faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease}\n.faq-item.open .faq-a{max-height:300px}\n.faq-a-inner{\n  padding:0 22px 20px;\n  font-size:14.5px;font-weight:600;color:var(--ink-soft);line-height:1.6;\n}\n\n/* \u2500\u2500\u2500\u2500\u2500 OFFER CARD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n.offer-wrap{padding:24px var(--pad-x) var(--pad-block);max-width:780px;margin:0 auto}\n.offer{\n  background:var(--card);\n  border-radius:32px;\n  padding:48px 26px 40px;\n  text-align:center;\n  box-shadow:var(--shadow);\n  position:relative;overflow:hidden;\n  border:1.5px solid var(--border);\n}\n.offer::before{\n  content:'';position:absolute;width:340px;height:340px;border-radius:50%;\n  background:var(--purple-tint);top:-120px;right:-120px;z-index:0;\n}\n.offer::after{\n  content:'';position:absolute;width:220px;height:220px;border-radius:50%;\n  background:var(--yellow-soft);bottom:-90px;left:-80px;z-index:0;\n  opacity:.6;\n}\n.offer>*{position:relative;z-index:1}\n.offer-tag{\n  display:inline-flex;align-items:center;gap:8px;\n  background:var(--purple);color:#fff;\n  font-size:11.5px;font-weight:900;letter-spacing:.1em;\n  text-transform:uppercase;padding:7px 16px;\n  border-radius:var(--radius-pill);margin-bottom:20px;\n}\n.offer-tag .pulse{\n  width:8px;height:8px;border-radius:50%;background:var(--yellow);\n  box-shadow:0 0 0 0 rgba(255,204,0,.6);\n  animation:pulseDot 1.6s infinite;\n}\n@keyframes pulseDot{\n  0%{box-shadow:0 0 0 0 rgba(255,204,0,.6)}\n  70%{box-shadow:0 0 0 8px rgba(255,204,0,0)}\n}\n.offer h2{font-size:clamp(26px,5vw,36px);font-weight:900;line-height:1.15;margin-bottom:12px;letter-spacing:-.015em}\n.offer .lead{font-size:15.5px;color:var(--ink-soft);font-weight:600;max-width:480px;margin:0 auto 28px}\n.includes{\n  display:flex;flex-direction:column;gap:11px;\n  max-width:420px;margin:0 auto 32px;text-align:left;\n  list-style:none;\n}\n.includes li{\n  display:flex;align-items:flex-start;\n  gap:12px;font-size:14.5px;font-weight:700;color:var(--ink);\n}\n.chk{\n  width:24px;height:24px;border-radius:50%;\n  background:var(--purple);color:#fff;\n  display:flex;align-items:center;justify-content:center;\n  flex-shrink:0;margin-top:1px;\n}\n.includes li:nth-child(3) .chk{background:var(--yellow-deep)}\n\n.price-block{\n  margin-bottom:26px;\n  padding:22px 18px;\n  background:var(--purple-tint);\n  border-radius:22px;\n  border:1.5px dashed var(--purple-soft);\n}\n.price-old{font-size:14px;font-weight:800;color:var(--ink-mute);text-decoration:line-through;margin-bottom:2px}\n.price-old::before{content:'de ';color:var(--ink-mute);font-weight:600}\n.price-main{\n  font-size:clamp(56px,11vw,76px);\n  font-weight:900;color:var(--purple-deep);\n  line-height:1;letter-spacing:-.03em;margin-bottom:6px;\n  display:flex;align-items:flex-start;justify-content:center;gap:4px;\n}\n.price-main sup{font-size:.32em;font-weight:800;margin-top:.5em;color:var(--purple)}\n.price-main .cents{font-size:.32em;font-weight:800;margin-top:.5em;color:var(--purple)}\n.price-or{font-size:13px;font-weight:800;color:var(--ink-mute);margin:6px 0 4px;text-transform:uppercase;letter-spacing:.12em}\n.price-parcela{font-size:18px;font-weight:800;color:var(--ink)}\n.price-parcela strong{color:var(--purple-deep)}\n\n.guarantee{\n  display:flex;align-items:center;justify-content:center;\n  gap:14px;margin-top:22px;padding-top:22px;\n  border-top:1.5px dashed var(--border);\n  font-size:13px;font-weight:800;color:var(--ink-soft);\n  text-align:left;\n  max-width:380px;margin-left:auto;margin-right:auto;\n}\n.g-badge{\n  width:54px;height:54px;border-radius:50%;\n  background:var(--yellow-soft);\n  border:3px dashed var(--yellow-deep);\n  display:flex;align-items:center;justify-content:center;\n  flex-shrink:0;\n  position:relative;\n}\n.g-badge::before{\n  content:'30';font-family:'Caveat',cursive;\n  font-size:24px;font-weight:700;color:var(--purple-deep);\n}\n.g-badge::after{\n  content:'dias';position:absolute;bottom:-2px;\n  font-size:9px;font-weight:900;color:var(--purple-deep);\n  letter-spacing:.05em;text-transform:uppercase;\n}\n\n/* \u2500\u2500\u2500\u2500\u2500 STICKY BOTTOM CTA \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n.sticky-cta{\n  position:fixed;bottom:0;left:0;right:0;\n  background:var(--card);\n  border-top:1.5px solid var(--border);\n  padding:10px 16px calc(10px + env(safe-area-inset-bottom));\n  display:flex;align-items:center;gap:10px;\n  z-index:80;\n  transform:translateY(110%);\n  transition:transform .35s ease;\n  box-shadow:0 -10px 28px -12px rgba(74,47,176,.18);\n}\n.sticky-cta.show{transform:translateY(0)}\n[data-sticky=\"off\"] .sticky-cta{display:none}\n.sticky-cta .price{\n  flex-shrink:0;display:flex;flex-direction:column;line-height:1;\n  font-size:11px;color:var(--ink-mute);font-weight:800;text-transform:uppercase;letter-spacing:.08em;\n}\n.sticky-cta .price b{font-size:18px;color:var(--purple-deep);font-weight:900;text-transform:none;letter-spacing:0}\n.sticky-cta a{\n  flex:1;background:var(--purple);color:#fff;\n  font-weight:900;font-size:14.5px;\n  padding:13px 14px;border-radius:var(--radius-btn);\n  text-decoration:none;text-align:center;\n  display:flex;align-items:center;justify-content:center;gap:8px;\n  box-shadow:0 8px 20px -6px rgba(123,79,232,.5);\n}\n.sticky-cta a .arrow{\n  width:22px;height:22px;border-radius:50%;background:var(--yellow);\n  color:var(--ink);display:inline-flex;align-items:center;justify-content:center;\n  font-weight:900;font-size:13px;\n}\n\n/* \u2500\u2500\u2500\u2500\u2500 FOOTER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfooter{\n  text-align:center;padding:32px 20px 100px;\n  font-size:12px;font-weight:700;color:var(--ink-mute);\n  border-top:1.5px solid var(--border);\n  background:var(--paper);\n}\nfooter a{color:var(--purple-deep);text-decoration:none;font-weight:800}\nfooter .sig{\n  font-family:'Caveat',cursive;font-size:24px;color:var(--purple);\n  font-weight:700;display:block;margin-bottom:6px;\n}\n\n/* \u2500\u2500\u2500\u2500\u2500 REVEAL ON SCROLL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n.reveal{opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s ease}\n.reveal.in{opacity:1;transform:none}\n\n/* \u2500\u2500\u2500\u2500\u2500 8-MIN DELAY GATE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n.delayed{display:none}\nbody.unlocked .delayed{display:revert}\nbody.unlocked #delayed-content{animation:gateFade .6s ease both}\n@keyframes gateFade -->\n\n<!-- \u2500\u2500\u2500 FOOTER \u2500\u2500\u2500 -->\n<footer>\n  <span class=\"sig\">\u2014 Prof. Jaquelyne<\/span>\n  \u00a9 2026 Bailarina em Casa \u00b7 <a href=\"#\">Pol\u00edtica de Privacidade<\/a> \u00b7 <a href=\"#\">Termos de Uso<\/a>\n<\/footer>\n\n<!-- \u2500\u2500\u2500 STICKY CTA (delayed too) \u2500\u2500\u2500 -->\n<div class=\"sticky-cta delayed\" id=\"stickyCta\" aria-hidden=\"true\">\n  <div class=\"price\">\n    de <span style=\"text-decoration:line-through\">R$594<\/span><b>R$ 297<\/b>\n  <\/div>\n  <a href=\"https://pay.hub.la/MXWBI6KpGNsZu3KFtbQU\" target=\"_blank\" rel=\"noopener\">Matricular agora <span class=\"arrow\">\u2192<\/span><\/a>\n<\/div>\n\n<script>\n/* \u2500\u2500\u2500 8-MINUTE DELAY GATE \u2500\u2500\u2500\n   Hides everything inside #delayed-content (and the sticky CTA) until 8 minutes\n   from the visitor's first arrival on the page. The \"first arrival\" timestamp\n   is persisted to localStorage so a refresh doesn't restart the timer.\n   Headline, eyebrow, video and the topbar above are NEVER delayed.\n   Dev shortcuts:\n     ?unlock=1  \u2192 unlocks immediately\n     ?reset=1   \u2192 clears the timer (page reloads)\n     Press U    \u2192 unlocks immediately\n*/\n(function(){\n  var DELAY_MS = 8 * 60 * 1000; // 8 minutes\n  var KEY = 'bec_arrival_ts_v1';\n  var qs = new URLSearchParams(location.search);\n\n  if (qs.get('reset') === '1') {\n    try { localStorage.removeItem(KEY); } catch(e){}\n    qs.delete('reset');\n    location.replace(location.pathname + (qs.toString() ? '?' + qs : '') + location.hash);\n    return;\n  }\n\n  var now = Date.now();\n  var arrival = null;\n  try { arrival = parseInt(localStorage.getItem(KEY) || '', 10) || null; } catch(e){}\n  if (!arrival) {\n    arrival = now;\n    try { localStorage.setItem(KEY, String(arrival)); } catch(e){}\n  }\n\n  var elapsed = now - arrival;\n  var remaining = Math.max(0, DELAY_MS - elapsed);\n  var forceUnlock = qs.get('unlock') === '1';\n\n  function unlock(){\n    if (document.body.classList.contains('unlocked')) return;\n    document.body.classList.add('unlocked');\n    var hint = document.getElementById('delayHint');\n    if (hint) hint.remove();\n    // Reveals inside #delayed-content were display:none when first observed.\n    // Re-observe so the fade-in animation actually runs after unlock.\n    setTimeout(function(){\n      if (window.__bec && window.__bec.observeReveals) window.__bec.observeReveals();\n    }, 0);\n  }\n  function checkUnlock(){\n    if (Date.now() - arrival >= DELAY_MS) unlock();\n  }\n\n  if (forceUnlock || remaining === 0) {\n    // unlock as soon as DOM is ready\n    if (document.readyState !== 'loading') unlock();\n    else document.addEventListener('DOMContentLoaded', unlock, {once:true});\n  } else {\n    setTimeout(checkUnlock, remaining);\n    // Safety net: a 1Hz poll catches any case where setTimeout fires late\n    // (background-tab throttling, CPU stalls, OS clock jumps). Self-cancels\n    // once unlocked so it adds no ongoing cost.\n    var poll = setInterval(function(){\n      checkUnlock();\n      if (document.body && document.body.classList.contains('unlocked')) clearInterval(poll);\n    }, 1000);\n    // Re-check the moment the tab returns to foreground.\n    document.addEventListener('visibilitychange', function(){\n      if (!document.hidden) checkUnlock();\n    });\n    // Optional dev hint visible only with ?debug=1\n    if (qs.get('debug') === '1') {\n      document.addEventListener('DOMContentLoaded', function(){\n        document.body.classList.add('show-hint');\n        var hint = document.createElement('div');\n        hint.id = 'delayHint';\n        hint.className = 'delay-hint';\n        document.body.appendChild(hint);\n        function tick(){\n          var left = Math.max(0, DELAY_MS - (Date.now() - arrival));\n          var m = Math.floor(left/60000), s = Math.floor((left%60000)/1000);\n          hint.textContent = 'Conte\u00fado libera em ' + m + ':' + (s<10?'0':'') + s;\n          if (left <= 0) { clearInterval(t); }\n        }\n        var t = setInterval(tick, 1000); tick();\n      }, {once:true});\n    }\n    // Manual override key\n    document.addEventListener('keydown', function(e){\n      if (e.key === 'u' || e.key === 'U') unlock();\n    });\n  }\n})();\n<\/script>\n\n<script>\n(function(){\n  // Apply initial tweaks to <html>\n  function applyTweaks(t){\n    const r = document.documentElement;\n    r.dataset.palette = t.palette || 'classic';\n    r.dataset.density = t.density || 'comfy';\n    r.dataset.hero    = t.heroLayout || 'centered';\n    r.dataset.hand    = t.handAccent === false ? 'off' : 'on';\n    r.dataset.sticky  = t.stickyCta === false ? 'off' : 'on';\n    document.getElementById('faq').style.display = (t.showFaq === false) ? 'none' : '';\n  }\n  applyTweaks(window.__TWEAKS__ || {});\n  window.__applyTweaks = applyTweaks;\n\n  // Module accordion\n  document.querySelectorAll('[data-mod]').forEach(el=>{\n    el.addEventListener('click', ()=>{\n      const open = el.classList.contains('open');\n      document.querySelectorAll('[data-mod]').forEach(m=>m.classList.remove('open'));\n      if(!open) el.classList.add('open');\n    });\n  });\n\n  // FAQ accordion\n  document.querySelectorAll('.faq-item .faq-q').forEach(btn=>{\n    btn.addEventListener('click', ()=>{\n      const item = btn.closest('.faq-item');\n      const wasOpen = item.classList.contains('open');\n      document.querySelectorAll('.faq-item').forEach(i=>i.classList.remove('open'));\n      if(!wasOpen) item.classList.add('open');\n    });\n  });\n\n  // Reveal on scroll\n  const io = new IntersectionObserver((entries)=>{\n    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });\n  }, {threshold:.12, rootMargin:'0px 0px -40px'});\n  window.__bec = window.__bec || {};\n  window.__bec.revealIO = io;\n  window.__bec.observeReveals = function(){\n    document.querySelectorAll('.reveal:not(.in)').forEach(el=>io.observe(el));\n  };\n  window.__bec.observeReveals();\n\n  // Sticky CTA appears after hero, hides near offer\n  const sticky = document.getElementById('stickyCta');\n  const offer  = document.getElementById('oferta');\n  function onScroll(){\n    if (document.documentElement.dataset.sticky === 'off') { sticky.classList.remove('show'); return; }\n    const y = window.scrollY;\n    const offerTop = offer.getBoundingClientRect().top + window.scrollY;\n    const offerBottom = offerTop + offer.offsetHeight;\n    const inHero = y < 300;\n    const inOffer = y + window.innerHeight > offerTop - 80 && y < offerBottom;\n    if (!inHero && !inOffer) sticky.classList.add('show');\n    else sticky.classList.remove('show');\n  }\n  window.addEventListener('scroll', onScroll, {passive:true});\n  onScroll();\n})();\n<\/script>\n\n\n\n<\/body><\/html>"
